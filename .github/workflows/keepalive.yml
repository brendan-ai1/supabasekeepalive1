name: Supabase Keepalive

on:
  schedule:
    # Runs every 4 days at 12:00 UTC. Free tier pauses after 7 days of
    # inactivity, so this gives a safe margin.
    - cron: "0 12 */4 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase keepalive table
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          response=$(curl -sS -w "\n%{http_code}" \
            "$SUPABASE_URL/rest/v1/keepalive?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")

          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)

          echo "HTTP $status"
          echo "Body: $body"

          if [ "$status" -ne 200 ]; then
            echo "Keepalive ping failed."
            exit 1
          fi
          echo "Supabase keepalive succeeded."
